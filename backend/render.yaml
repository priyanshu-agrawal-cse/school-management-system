services:
  - type: web
    name: school-management-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: MONGO_URL
        sync: false   # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set manually in Render dashboard
      - key: FRONTEND_URL
        value: https://school-management-system-khaki-nine.vercel.app
